<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #312e81;
      --card: rgba(255,255,255,0.12);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #0ea5e9 0, transparent 30%),
        radial-gradient(circle at bottom right, #7c3aed 0, transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .scoreboard {
      width: min(100%, 950px);
      padding: 32px;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .title {
      font-size: clamp(2rem, 5vw, 4rem);
      margin: 0;
      letter-spacing: 0.04em;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 1.1rem;
    }

    .teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 24px;
      align-items: center;
    }

    .team {
      background: var(--card);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .team-name {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--muted);
      margin-bottom: 12px;
    }

    .score {
      font-size: clamp(5rem, 15vw, 10rem);
      line-height: 1;
      font-weight: 900;
      text-shadow: 0 0 30px rgba(56, 189, 248, 0.45);
    }

    .vs {
      font-weight: 900;
      font-size: 2rem;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.8);
    }

    .footer {
      text-align: center;
      color: var(--muted);
      margin-top: 28px;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      .teams {
        grid-template-columns: 1fr;
      }

      .vs {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="scoreboard">
    <div class="header">
      <h1 class="title" id="gameTitle"></h1>
      <div class="subtitle" id="subtitle"></div>
    </div>

    <section class="teams">
      <div class="team">
        <div class="team-name" id="teamAName"></div>
        <div class="score" id="teamAScore"></div>
      </div>

      <div class="vs">VS</div>

      <div class="team">
        <div class="team-name" id="teamBName"></div>
        <div class="score" id="teamBScore"></div>
      </div>
    </section>

    <div class="footer" id="footer"></div>
  </main>

  <script>
    const scoreboard = {
      title: "The Glory Board",
      subtitle: "Live Scoreboard",
      teamA: "KM",
      teamB: "CB",
      scoreA: 2,
      scoreB: 4,
      footer: "Last updated: July 14, 2026"
    };

    document.getElementById("gameTitle").textContent = scoreboard.title;
    document.getElementById("subtitle").textContent = scoreboard.subtitle;
    document.getElementById("teamAName").textContent = scoreboard.teamA;
    document.getElementById("teamBName").textContent = scoreboard.teamB;
    document.getElementById("teamAScore").textContent = scoreboard.scoreA;
    document.getElementById("teamBScore").textContent = scoreboard.scoreB;
    document.getElementById("footer").textContent = scoreboard.footer;
  </script>
</body>
</html>
